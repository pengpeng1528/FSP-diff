# general settings
name: train_FSPS2
model_type: FSPS2Model
scale: 1
num_gpu: auto  # auto: can infer from your visible devices automatically. official: 4 GPUs
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: DeblurPairedDataset
    # dataroot_gt: /SSD_8T/pengpeng/DiffIR-master03/3data/train/clean
    # dataroot_lq: /SSD_8T/pengpeng/DiffIR-master03/3data/train/noisy
    # dataroot_gt: /SSD_8T/pengpeng/DiffIR-master03/allfenpro3
    # dataroot_lq: /SSD_8T/pengpeng/DiffIR-master03/allfenpronoisy20003
    # dataroot_gt: /SSD_8T/pengpeng/DiffIR-master03/allfentu/train
    # dataroot_lq: /SSD_8T/pengpeng/DiffIR-master03/allfentu2000/train
    # dataroot_gt: /SSD_8T/pengpeng/DiffIR-master03/allfenpro3
    # dataroot_lq: /SSD_8T/pengpeng/DiffIR-master03/allfenpronoisy5003
    dataroot_gt: /SSD_8T/彭鹏/数据/allfentu/train
    dataroot_lq: /SSD_8T/彭鹏/数据/allfentu2000/train
    geometric_augs: true

    filename_tmpl: '{}'
    io_backend:
      type: disk


    # num_worker_per_gpu: 12
    # batch_size_per_gpu: 8
    # mini_batch_sizes: [8,4,2,2,1,1]             # Batch size per gpu   
    # iters: [150000,60000,50000,60000,40000,40000]
    # gt_size: 512   # Max patch size for progressive training
    # gt_sizes: [192, 256,320,384,464,512]  # Patch sizes for progressive training.
    # num_worker_per_gpu: 8
    # batch_size_per_gpu: 1
    # mini_batch_sizes: [1]             # Batch size per gpu   
    # iters: [100000]
    # gt_size: 512   # Max patch size for progressive training
    # gt_sizes: [512]  # Patch sizes for progressive training.
    num_worker_per_gpu: 8
    batch_size_per_gpu: 1
    mini_batch_sizes: [4,2,2,2,1,1]             # Batch size per gpu   
    iters: [30000,30000,20000,20000,20000,20000]
    gt_size: 512   # Max patch size for progressive training
    gt_sizes: [192, 256,320,384,464,512]  # Patch sizes for progressive training.

    # data loader
    use_shuffle: true
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  # Uncomment these for validation
  val:
    name: ValSet
    type: DeblurPairedDataset
    # dataroot_gt: /SSD_8T/pengpeng/DiffIR-master03/3data/val/clean
    # dataroot_lq: /SSD_8T/pengpeng/DiffIR-master03/3data/val/noisy
    # dataroot_gt: /SSD_8T/pengpeng/DiffIR-master03/allfenpro3/qita/val
    # dataroot_lq: /SSD_8T/pengpeng/DiffIR-master03/allfenpronoisy20003/qita/val
    # dataroot_gt: /SSD_8T/pengpeng/DiffIR-master03/allfentu/val
    # dataroot_lq: /SSD_8T/pengpeng/DiffIR-master03/allfentu2000/val
    # dataroot_gt: /SSD_8T/pengpeng/DiffIR-master03/allfenpro3/qita/val
    # dataroot_lq: /SSD_8T/pengpeng/DiffIR-master03/allfenpronoisy5003/qita/val
    dataroot_gt: /SSD_8T/彭鹏/数据/allfentu/val
    dataroot_lq: /SSD_8T/彭鹏/数据/allfentu2000/val

    io_backend:
      type: disk

# network structures
network_g:
  type: FSPS2
  n_encoder_res: 5
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [6,5,5,4]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2
  bias: False
  LayerNorm_type: WithBias
  n_denoise_res: 1
  linear_start: 0.1
  linear_end: 0.99
  timesteps: 4

# network structures
network_S1:
  type: FSPS1
  n_encoder_res: 5
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [6,5,5,4]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2
  bias: False
  LayerNorm_type: WithBias



# path
path:
  pretrain_network_g: /SSD_8T/pengpeng/DiffIR-master03/FSP-demotionblur/experiments/train_FSPS1/models/net_g_400.pth
  pretrain_network_S1: /SSD_8T/pengpeng/DiffIR-master03/FSP-demotionblur/experiments/train_FSPS1/models/net_g_400.pth
  param_key_g: params_ema
  strict_load_g: False
  resume_state: ~
  ignore_resume_networks: network_S1

# training settings
train:
  ema_decay: 0.999

  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [75000]
    gamma: 0.5

  encoder_iter: 20000
  total_iter: 210000
  lr_encoder: !!float 2e-4
  lr_sr: !!float 2e-4
  gamma_encoder: 0.1
  gamma_sr: 0.5
  lr_decay_encoder: 60000
  lr_decay_sr: 30000
  warmup_iter: -1  # no warm up

  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 255.0
    reduction: mean
  mse_opt:
    type: MSELoss
    loss_weight: 0
    reduction: mean
  ssim_opt:
    type: SSIMLoss
    loss_weight: 0.5
    reduction: mean

  kd_opt:
    type: KDLoss
    loss_weight: 1
    temperature: 0.15

# Uncomment these for validation
# validation settings
val:
  window_size: 8
  val_freq: !!float 5e3
  save_img: False

  metrics:
    psnr: # metric name
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 1000
  save_checkpoint_freq: !!float 2e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
